<div class="layout-panel" [attr.data-theme]="temaActual">
  <header class="panel-header">
    <div class="panel-header__titulo">
      <button
        type="button"
        class="burger-btn"
        (click)="toggleSidebar()"
        aria-label="Abrir menu"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z" />
        </svg>
      </button>

      <span class="panel-header__logo">
        <img [src]="temaActual === 'light' ? 'inicial-logo-negro.png' : 'logo.ico'" alt="logo" />
      </span>

      <div class="panel-header__textos">
        <div class="panel-header__app">Registro de Asistencia</div>
        <div class="panel-header__sub">Panel de Gestion</div>
      </div>
    </div>

    <div class="panel-header__acciones">
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTema()"
        [attr.aria-pressed]="temaActual === 'light'"
        aria-label="Cambiar tema"
      >
        <span class="theme-toggle__icon" aria-hidden="true">
          {{ temaActual === 'dark' ? '☾' : '☀' }}
        </span>
        <span class="theme-toggle__text">{{ temaLabel }}</span>
      </button>

      <div class="panel-header__usuario" *ngIf="usuario$ | async as usuario">
        <button
          type="button"
          class="user-trigger"
          (click)="toggleUserMenu($event)"
          [attr.aria-expanded]="userMenuOpen"
          aria-haspopup="menu"
        >
          <div class="user-info">
            <div class="user-name">
              {{ usuario.nombre.split(' ')[0] }} {{ usuario.apellido_paterno }}
            </div>
            <div class="user-role">{{ usuario.rol }}</div>
          </div>

          <div class="user-avatar">
            {{ getIniciales(usuario.nombre, usuario.apellido_paterno) }}
          </div>

          <span class="user-caret" aria-hidden="true">▾</span>
        </button>

        <div class="user-dropdown" *ngIf="userMenuOpen" role="menu">
          <a class="user-item" routerLink="/panel" (click)="closeUserMenu()">
            <span class="user-item__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3l9 8h-3v10h-5v-6H11v6H6V11H3l9-8z" />
              </svg>
            </span>
            <span class="user-item__text">Home</span>
          </a>

          <div class="user-divider"></div>

          <button
            type="button"
            class="user-item user-item--danger"
            (click)="closeUserMenu(); cerrarSesion()"
          >
            <span class="user-item__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path
                  d="M10 17l1.41-1.41L9.83 14H21v-2H9.83l1.58-1.59L10 9l-5 5 5 5zM4 4h8V2H4a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h8v-2H4V4z"
                />
              </svg>
            </span>
            <span class="user-item__text">Cerrar sesion</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <div class="panel-body">
    <nav class="panel-sidebar" [class.panel-sidebar--open]="sidebarOpen">
      <div class="sidebar-top">
        <div class="sidebar__titulo">Menu</div>

        <button
          type="button"
          class="sidebar-close"
          (click)="closeSidebar()"
          aria-label="Cerrar menu"
        >
          ✕
        </button>
      </div>

      <a
        routerLink="/panel/inicio"
        routerLinkActive="activo"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__item"
        (click)="closeSidebarOnMobile()"
      >
        <span class="sidebar__item-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 3l8 7v10h-5v-6H9v6H4V10l8-7z" />
          </svg>
        </span>
        <span>Inicio</span>
      </a>

      <div class="sidebar__grupo">
        <button
          type="button"
          class="sidebar__grupo-titulo"
          (click)="toggleGrupoUsuarios()"
        >
          <span>Usuarios</span>
          <span
            class="sidebar__grupo-icon"
            [class.sidebar__grupo-icon--open]="grupoUsuariosAbierto"
          >
            ▾
          </span>
        </button>

        <ng-container *ngIf="grupoUsuariosAbierto">
          <a
            routerLink="/panel/usuarios"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.95 1.97 3.45v2H24v-2c0-2.66-5.33-4-8-4z" />
              </svg>
            </span>
            <span>Ver usuarios</span>
          </a>

          <a
            routerLink="/panel/areas"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 11h8V3H3zm10 10h8v-8h-8zM3 21h8v-8H3zm10-10h8V3h-8z" />
              </svg>
            </span>
            <span>Areas</span>
          </a>

          <a
            routerLink="/panel/sedes"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 2h16v20H4zm3 3v3h2V5zm4 0v3h2V5zm4 0v3h2V5zM7 10v3h2v-3zm4 0v3h2v-3zm4 0v3h2v-3zM7 15v4h10v-4z" />
              </svg>
            </span>
            <span>Sedes</span>
          </a>
        </ng-container>
      </div>

      <div class="sidebar__grupo">
        <button
          type="button"
          class="sidebar__grupo-titulo"
          (click)="toggleGrupoEmpleados()"
        >
          <span>Empleados</span>
          <span
            class="sidebar__grupo-icon"
            [class.sidebar__grupo-icon--open]="grupoEmpleadosAbierto"
          >
            ▾
          </span>
        </button>

        <ng-container *ngIf="grupoEmpleadosAbierto">
          <a
            routerLink="/panel/empleados"
            routerLinkActive="activo"
            [routerLinkActiveOptions]="{ exact: true }"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 12c2.76 0 5-2.24 5-5S14.76 2 12 2 7 4.24 7 7s2.24 5 5 5zm0 2c-3.33 0-10 1.67-10 5v3h20v-3c0-3.33-6.67-5-10-5z" />
              </svg>
            </span>
            <span>Listado de empleados</span>
          </a>

          <a
            routerLink="/panel/empleados/asistencias"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M19 3h-1V1h-2v2H8V1H6v2H5a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm0 17H5V10h14zm-7-8h5v5h-5z" />
              </svg>
            </span>
            <span>Asistencias</span>
          </a>
        </ng-container>
      </div>

      <div class="sidebar__grupo">
        <button
          type="button"
          class="sidebar__grupo-titulo"
          (click)="toggleGrupoReportes()"
        >
          <span>Reportes</span>
          <span
            class="sidebar__grupo-icon"
            [class.sidebar__grupo-icon--open]="grupoReportesAbierto"
          >
            ▾
          </span>
        </button>

        <ng-container *ngIf="grupoReportesAbierto">
          <a
            routerLink="/panel/reportes/usuarios"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M5 3h14a2 2 0 0 1 2 2v14l-4-3H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm2 4v2h10V7zm0 4v2h7v-2z" />
              </svg>
            </span>
            <span>Reporte de usuarios</span>
          </a>

          <a
            routerLink="/panel/reportes/asistencias"
            routerLinkActive="activo"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 19h16v2H4zm2-2h3V9H6zm5 0h3V5h-3zm5 0h3v-7h-3z" />
              </svg>
            </span>
            <span>Reporte de asistencias</span>
          </a>

          <a
            routerLink="/panel/reportes/asistencias-detalle"
            fragment="detalle"
            class="sidebar__item sidebar__item--sub"
            (click)="closeSidebarOnMobile()"
          >
            <span class="sidebar__item-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M6 2h9l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm8 1.5V8h4.5M8 12h8v-2H8zm0 4h8v-2H8zm0 4h5v-2H8z" />
              </svg>
            </span>
            <span>Asistencia detalle</span>
          </a>
        </ng-container>
      </div>
    </nav>

    <main class="panel-contenido">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
